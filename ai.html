
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Riddle & Joke Generator</title>

<style>
body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #eef2ff, #f8fafc);
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background: white;
    padding: 30px;
    border-radius: 18px;
    box-shadow: 0 12px 30px rgba(0,0,0,0.1);
    width: 420px;
    text-align: center;
}

h1 {
    margin-bottom: 10px;
}

/* MODE BUTTONS (GRAY) */
.mode-buttons button {
    padding: 10px 14px;
    margin: 5px;
    border-radius: 20px;
    border: none;
    cursor: pointer;
    background: #e5e7eb;
    color: #333;
    transition: 0.2s;
}

.mode-buttons button:hover {
    background: #d1d5db;
}

.mode-buttons button.active {
    background: #9ca3af;
    color: white;
}

/* SELECT */
select {
    padding: 8px;
    border-radius: 8px;
    margin-bottom: 15px;
}

/* BUTTONS (SAME COLOR) */
.button-row {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 15px;
}

.main-btn {
    background: #3b82f6;
    color: white;
    border: none;
    padding: 10px;
    border-radius: 10px;
    cursor: pointer;
    transition: 0.2s;
}

.main-btn:hover {
    background: #2563eb;
}

/* FLIP CARD (CENTERED) */
.flip-card {
    display: flex;
    justify-content: center;
    margin-top: 25px;
    perspective: 1000px;
}

.flip-inner {
    position: relative;
    width: 100%;
    max-width: 360px;
    height: 130px;
    transition: transform 0.6s;
    transform-style: preserve-3d;
}

.flip-inner.flipped {
    transform: rotateY(180deg);
}

.card {
    position: absolute;
    width: 100%;
    height: 100%;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 15px;
    backface-visibility: hidden;
    font-size: 18px;
    text-align: center;
}

.front {
    background: #f9fafb;
    border: 2px solid #3b82f6;
}

.back {
    background: #eef2ff;
    border: 2px solid #3b82f6;
    transform: rotateY(180deg);
    font-weight: bold;
}
</style>
</head>

<body>

<div class="container">
    <h1 id="title">Riddle Generator</h1>

    <div class="mode-buttons">
        <button onclick="setMode('riddle')" id="riddleBtn" class="active">Riddles</button>
        <button onclick="setMode('joke')" id="jokeBtn">Jokes</button>
    </div>

    <div id="difficultyContainer">
        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="intermediate">Intermediate</option>
            <option value="hard">Hard</option>
        </select>
    </div>

    <div class="button-row">
        <button class="main-btn" onclick="generateContent()">Generate</button>
        <button class="main-btn" onclick="flipCard()">Show Answer</button>
    </div>

    <!-- FLIP CARD -->
    <div class="flip-card">
        <div class="flip-inner" id="card">
            <div class="card front" id="front">Click Generate to start!</div>
            <div class="card back" id="back"></div>
        </div>
    </div>
</div>

<script>
let mode = "riddle";

// DATA
const riddles = {
    easy: [
        { q: "What has to be broken before you can use it?", a: "An egg" },
        { q: "What has hands but can’t clap?", a: "A clock" }
    ],
    intermediate: [
        { q: "I speak without a mouth and hear without ears. What am I?", a: "An echo" }
    ],
    hard: [
        { q: "What disappears as soon as you say its name?", a: "Silence" }
    ]
};

const jokes = [
    { setup: "Why don’t skeletons fight each other?", punchline: "They don’t have the guts." },
    { setup: "Why did the scarecrow win an award?", punchline: "Because he was outstanding in his field." }
];

// MODE SWITCH
function setMode(selected) {
    mode = selected;
    resetCard();

    document.getElementById("riddleBtn").classList.toggle("active", selected === "riddle");
    document.getElementById("jokeBtn").classList.toggle("active", selected === "joke");

    if (mode === "riddle") {
        document.getElementById("title").innerText = "Riddle Generator";
        document.getElementById("difficultyContainer").style.display = "block";
    } else {
        document.getElementById("title").innerText = "Joke Generator";
        document.getElementById("difficultyContainer").style.display = "none";
    }
}

// GENERATE
function generateContent() {
    resetCard();

    if (mode === "riddle") {
        const difficulty = document.getElementById("difficulty").value;
        const list = riddles[difficulty];
        const random = list[Math.floor(Math.random() * list.length)];

        document.getElementById("front").innerText = random.q;
        document.getElementById("back").innerText = random.a;

    } else {
        const random = jokes[Math.floor(Math.random() * jokes.length)];

        document.getElementById("front").innerText = random.setup;
        document.getElementById("back").innerText = random.punchline;
    }
}

// FLIP
function flipCard() {
    document.getElementById("card").classList.toggle("flipped");
}

// RESET
function resetCard() {
    document.getElementById("card").classList.remove("flipped");
    document.getElementById("front").innerText = "Click Generate to start!";
    document.getElementById("back").innerText = "";
}
</script>

</body>
</html>
